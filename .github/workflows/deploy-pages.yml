name: Deploy to GitHub Pages

# Publishes the static game (index.html) to GitHub Pages so it can be played
# from a live URL. Runs for main and for the active feature branch, plus on
# manual dispatch, so the branch can be tested before it is merged.
on:
  push:
    branches:
      - main
      - claude/pvp-nba-draft-game-n5rb0e
  workflow_dispatch:

# Permissions required for the official GitHub Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically if it hasn't been enabled yet.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root: index.html is the entry point.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
